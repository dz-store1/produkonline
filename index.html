<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>@sentrapremium • Katalog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0e1022;
    --bg-2: #14172e;
    --card: #191c37;
    --card-edge: #262a4d;
    --violet: #8b7bff;
    --teal: #2fd3c9;
    --gold: #ffc857;
    --text: #f1f0fb;
    --text-dim: #9b9ac0;
    --text-faint: #6b699a;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:
      radial-gradient(circle at 15% 0%, rgba(139,123,255,0.18), transparent 45%),
      radial-gradient(circle at 85% 15%, rgba(47,211,201,0.14), transparent 40%),
      var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding: 48px 16px 80px;
  }
  .wrap{ max-width: 620px; margin: 0 auto; }

  /* header */
  .avatar{
    width: 84px; height: 84px; border-radius: 24px;
    margin: 0 auto 18px;
    background: linear-gradient(145deg, var(--violet), var(--teal));
    display:flex; align-items:center; justify-content:center;
    font-family:'Space Grotesk', sans-serif; font-weight:700; font-size: 30px;
    color:#0e1022;
    box-shadow: 0 12px 30px -8px rgba(139,123,255,0.55);
  }
  .handle{
    text-align:center; font-family:'Space Grotesk', sans-serif;
    font-size: 22px; font-weight:700; letter-spacing: -0.01em;
  }
  .bio{
    text-align:center; color: var(--text-dim); font-size: 14px;
    margin: 8px auto 20px; max-width: 380px; line-height:1.5;
  }
  .socials{
    display:flex; justify-content:center; gap:10px; margin-bottom: 32px; flex-wrap: wrap;
  }
  .socials a{
    width: 38px; height: 38px; border-radius: 12px;
    background: var(--card); border: 1px solid var(--card-edge);
    display:flex; align-items:center; justify-content:center;
    color: var(--text-dim); text-decoration:none; font-size: 16px;
    transition: all .15s ease;
  }
  .socials a:hover{ color: var(--teal); border-color: var(--teal); transform: translateY(-2px); }

  /* live badge */
  .live{
    display:flex; align-items:center; justify-content:center; gap:8px;
    font-family:'JetBrains Mono', monospace; font-size: 11px;
    color: var(--teal); text-transform:uppercase; letter-spacing: .12em;
    margin-bottom: 28px;
  }
  .live .dot{ width:7px; height:7px; border-radius:50%; background: var(--teal); box-shadow: 0 0 0 4px rgba(47,211,201,0.18); animation: pulse 1.8s infinite; }
  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:.4;} }

  /* category chips */
  .chips{
    display:flex; gap:8px; overflow-x:auto; padding-bottom: 6px; margin-bottom: 28px;
    scrollbar-width: none;
  }
  .chips::-webkit-scrollbar{ display:none; }
  .chip{
    flex: none; padding: 9px 16px; border-radius: 999px;
    background: var(--card); border: 1px solid var(--card-edge);
    color: var(--text-dim); font-size: 13px; font-weight:600;
    cursor:pointer; white-space:nowrap; transition: all .15s ease;
    font-family:'Inter', sans-serif;
  }
  .chip:hover{ color: var(--text); border-color: #3a3e6b; }
  .chip.active{
    background: linear-gradient(120deg, var(--violet), var(--teal));
    color: #0e1022; border-color: transparent;
  }

  /* grid */
  .grid{ display:grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 480px){ .grid{ grid-template-columns: 1fr; } }

  .ticket{
    position: relative;
    background: var(--card);
    border: 1px solid var(--card-edge);
    border-radius: 18px;
    overflow: hidden;
    display:flex; flex-direction:column;
    animation: rise .5s ease both;
  }
  .ticket:hover{ border-color: #3d4177; }

  .badge{
    height: 92px;
    display:flex; align-items:center; justify-content:center;
    position: relative; overflow:hidden;
  }
  .badge img{ height: 34px; width:auto; object-fit:contain; }
  .badge .capcut-mark{ display:flex; flex-direction:column; align-items:center; gap:4px; }
  .badge .capcut-mark svg{ height:26px; width:26px; }
  .badge .capcut-mark span{
    font-family:'Space Grotesk', sans-serif; font-weight:700; font-size: 13px;
    color:#fff; letter-spacing:-0.01em;
  }
  .t-info{ padding: 14px 16px 0; }
  .t-name{ font-size: 13.5px; font-weight:600; line-height:1.35; min-height: 36px; }
  .t-cat{ font-size: 11px; color: var(--text-faint); margin-top:4px; text-transform:uppercase; letter-spacing:.06em; }

  /* perforation divider */
  .perf{
    position:relative; height: 0; margin: 14px 0 0;
    border-top: 1.5px dashed var(--card-edge);
  }
  .perf::before, .perf::after{
    content:''; position:absolute; top:-8px; width:16px; height:16px;
    border-radius:50%; background: var(--bg);
  }
  .perf::before{ left:-9px; }
  .perf::after{ right:-9px; }

  .t-bottom{
    display:flex; align-items:center; justify-content:space-between;
    padding: 12px 16px 16px;
  }
  .price{ font-family:'JetBrains Mono', monospace; font-weight:700; font-size: 15px; color: var(--gold); }
  .buy{
    font-size: 11.5px; font-weight:700; color: #0e1022;
    background: var(--teal); border:none; padding: 7px 12px; border-radius: 9px;
    cursor:pointer; text-decoration:none; font-family:'Inter',sans-serif;
    transition: transform .12s ease;
  }
  .buy:hover{ transform: translateY(-1px); filter: brightness(1.08); }

  @keyframes rise{ from{ opacity:0; transform: translateY(10px);} to{ opacity:1; transform:none; } }

  .empty{
    grid-column: 1 / -1;
    text-align:center; padding: 48px 20px; color: var(--text-faint);
    border: 1px dashed var(--card-edge); border-radius: 18px; font-size: 13.5px;
  }

  .foot{
    text-align:center; margin-top: 40px; font-size: 12px; color: var(--text-faint);
  }
  .foot a{ color: var(--text-dim); }
</style>
</head>

// ====== KONFIGURASI SUMBER DATA (GOOGLE SHEET) ======
// 1. Buat Google Sheet dengan kolom: nama | kategori | harga
// 2. File > Share > Publish to web > pilih sheet-nya > format CSV > Publish
// 3. Tempel link yang dihasilkan di bawah ini
const SHEET_CSV_URL = ""; // contoh: "https://docs.google.com/spreadsheets/d/e/xxxxx/pub?output=csv"
const POLL_INTERVAL_MS = 20000; // cek update setiap 20 detik

// Data cadangan, dipakai kalau SHEET_CSV_URL belum diisi atau gagal dimuat
const fallbackProducts = [
  { name: "Shared Mobile 1 Hari CapCut Pro", cat: "CapCut", price: 7500 },
  { name: "Shared Duo 1 Hari CapCut Pro", cat: "CapCut", price: 8500 },
  { name: "Invite 1 Hari CapCut Pro", cat: "CapCut", price: 9500 },
  { name: "Shared Mobile 6-7 Hari CapCut Pro", cat: "CapCut", price: 10500 },
  { name: "Shared Duo 6-7 Hari CapCut Pro", cat: "CapCut", price: 13000 },
  { name: "Private 6-7 Hari CapCut Pro", cat: "CapCut", price: 15000 },
  { name: "Shared Mobile 28-30 Hari CapCut Pro", cat: "CapCut", price: 23000 },
  { name: "Shared Duo 28 Hari CapCut Pro", cat: "CapCut", price: 30000 },
  { name: "Invite 1 Bulan CapCut Pro", cat: "CapCut", price: 44000 },
  { name: "Canva Tim Pro 1 Bulan", cat: "Canva", price: 23000 },
  { name: "Invite Pro + Designer Canva", cat: "Canva", price: 13000 },
  { name: "Invite Pro 1 Bulan Canva", cat: "Canva", price: 10000 },
  { name: "Netflix 3 Hari", cat: "Netflix", price: 10000 },
  { name: "Netflix Promo 28 Hari", cat: "Netflix", price: 25000 },
];

let products = fallbackProducts;
let lastCsvText = "";

// Parser CSV kecil, menangani nilai yang dibungkus tanda kutip
function parseCsv(text){
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for(let i = 0; i < text.length; i++){
    const c = text[i];
    if(inQuotes){
      if(c === '"'){
        if(text[i+1] === '"'){ field += '"'; i++; }
        else inQuotes = false;
      } else field += c;
    } else {
      if(c === '"') inQuotes = true;
      else if(c === ','){ row.push(field); field = ''; }
      else if(c === '\n' || c === '\r'){
        if(field !== '' || row.length){ row.push(field); rows.push(row); }
        row = []; field = '';
        if(c === '\r' && text[i+1] === '\n') i++;
      } else field += c;
    }
  }
  if(field !== '' || row.length){ row.push(field); rows.push(row); }
  return rows.filter(r => r.length && r.some(v => v.trim() !== ''));
}

function csvToProducts(text){
  const rows = parseCsv(text);
  if(rows.length < 2) return null;
  const header = rows[0].map(h => h.trim().toLowerCase());
  const iName = header.indexOf('nama');
  const iCat = header.indexOf('kategori');
  const iPrice = header.indexOf('harga');
  if(iName === -1 || iCat === -1 || iPrice === -1) return null;

  return rows.slice(1).map(r => ({
    name: (r[iName] || '').trim(),
    cat: (r[iCat] || '').trim(),
    price: parseInt(String(r[iPrice] || '0').replace(/[^0-9]/g, ''), 10) || 0,
  })).filter(p => p.name);
}

async function loadFromSheet(isBackground){
  if(!SHEET_CSV_URL){ setLive(false); return; }
  try{
    const res = await fetch(SHEET_CSV_URL + (SHEET_CSV_URL.includes('?') ? '&' : '?') + 'cachebust=' + Date.now());
    if(!res.ok) throw new Error('fetch failed');
    const text = await res.text();
    if(text === lastCsvText) { setLive(true); return; } // tidak ada perubahan
    const parsed = csvToProducts(text);
    if(!parsed || !parsed.length) throw new Error('format csv tidak sesuai');
    lastCsvText = text;
    products = parsed;
    setLive(true);
    renderChips();
    renderGrid();
  } catch(err){
    console.warn('Gagal memuat dari Google Sheet, pakai data cadangan.', err);
    setLive(false);
    if(!isBackground) { products = fallbackProducts; renderChips(); renderGrid(); }
  }
}

function setLive(ok){
  const dot = document.getElementById('liveDot');
  const label = document.getElementById('liveLabel');
  if(!dot || !label) return;
  if(!SHEET_CSV_URL){
    dot.style.background = '#6b699a';
    label.textContent = 'Mode contoh — sambungkan Google Sheet di kode';
    return;
  }
  dot.style.background = ok ? 'var(--teal)' : '#ff5f6d';
  label.textContent = ok ? 'Tersambung ke Google Sheet' : 'Gagal sambung, memakai data terakhir';
}

const defaultBadge = ["#8b7bff","#5a4fd6"];

function getBadgeColors(cat){
  return ["#f4f4f8","#e3e3ee"];
}

function getBadgeContent(cat){
  const c = (cat || '').toLowerCase();
  if(c.includes('canva')) return `<img src="${logoCanva}" alt="Canva" style="height:52px;">`;
  if(c.includes('netflix')) return `<img src="${logoNetflix}" alt="Netflix" style="height:24px;">`;
  if(c.includes('capcut')) return `<img src="${logoCapcut}" alt="CapCut" style="height:34px;">`;
  // fallback untuk kategori baru: badge inisial otomatis
  const initials = (cat || '?').trim().slice(0, 2).toUpperCase();
  return `<div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:22px;color:#0e1022;">${initials}</div>`;
}

const categories = ["Semua", ...Array.from(new Set(products.map(p => p.cat)))];
let active = "Semua";

const chipsEl = document.getElementById('chips');
const gridEl = document.getElementById('grid');

function formatRp(n){
  return "Rp " + n.toLocaleString('id-ID');
}

function renderChips(){
  chipsEl.innerHTML = '';
  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'chip' + (cat === active ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => { active = cat; renderChips(); renderGrid(); };
    chipsEl.appendChild(btn);
  });
}

function renderGrid(){
  gridEl.innerHTML = '';
  const list = active === "Semua" ? products : products.filter(p => p.cat === active);

  if(list.length === 0){
    gridEl.innerHTML = '<div class="empty">Belum ada produk di kategori ini. Cek lagi nanti ya!</div>';
    return;
  }

  list.forEach((p, i) => {
    const [c1, c2] = getBadgeColors(p.cat);
    const card = document.createElement('div');
    card.className = 'ticket';
    card.style.animationDelay = (i * 0.04) + 's';
    card.innerHTML = `
      <div class="badge" style="background: linear-gradient(135deg, ${c1}, ${c2});">${getBadgeContent(p.cat)}</div>
      <div class="t-info">
        <div class="t-name">${p.name}</div>
        <div class="t-cat">${p.cat}</div>
      </div>
      <div class="perf"></div>
      <div class="t-bottom">
        <div class="price">${formatRp(p.price)}</div>
        <a class="buy" href="https://wa.me/?text=${encodeURIComponent('Halo, saya mau order: ' + p.name)}" target="_blank">Order →</a>
      </div>
    `;
    gridEl.appendChild(card);
  });
}

renderChips();
renderGrid();
loadFromSheet(false);
setInterval(() => loadFromSheet(true), POLL_INTERVAL_MS);
</script>
