<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fomo Store • Katalog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #f3f4f9;
    --bg-2: #ffffff;
    --card: #ffffff;
    --card-edge: #e3e5f0;
    --violet: #7c6fee;
    --teal: #14b8ac;
    --gold: #16A34A;
    --text: #1c1d2e;
    --text-dim: #5c5e75;
    --text-faint: #9799ad;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{
    background: var(--bg);
    scroll-behavior: smooth;
  }
  body{
    position: relative;
    background:
      radial-gradient(circle at 15% 0%, rgba(124,111,238,0.14), transparent 45%),
      radial-gradient(circle at 85% 10%, rgba(20,184,172,0.14), transparent 42%),
      radial-gradient(circle at 50% 100%, rgba(124,111,238,0.10), transparent 50%),
      linear-gradient(180deg, #f7f8fc 0%, #f3f4f9 45%, #eef0f7 100%);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding: 48px 16px 80px;
    overflow-x: hidden;
  }
  .bg-scene{
    position: absolute; inset: 0; width: 100%; height: 100%;
    z-index: 0; pointer-events: none;
  }
  .wrap{ max-width: 820px; margin: 0 auto; position: relative; z-index: 1; }

  /* header */
  .avatar{
    width: 84px; height: 84px; border-radius: 24px;
    margin: 0 auto 18px;
    background: #fff;
    display:flex; align-items:center; justify-content:center;
    overflow: hidden;
    box-shadow: 0 12px 30px -8px rgba(47,211,201,0.45);
  }
  .avatar img{ width: 100%; height: 100%; object-fit: cover; }
  .handle{
    text-align:center; font-family:'Space Grotesk', sans-serif;
    font-size: 22px; font-weight:700; letter-spacing: -0.01em;
  }
  .bio{
    text-align:center; color: var(--text-dim); font-size: 14px;
    margin: 8px auto 20px; max-width: 380px; line-height:1.5;
  }
  .socials{
    display:flex; justify-content:center; gap:10px; margin-bottom: 32px; flex-wrap: wrap;
  }
  .socials a{
    width: 38px; height: 38px; border-radius: 12px;
    background: var(--card); border: 1px solid var(--card-edge);
    display:flex; align-items:center; justify-content:center;
    color: var(--text-dim); text-decoration:none; font-size: 16px;
    transition: all .15s ease;
  }
  .socials a:hover{ color: var(--teal); border-color: var(--teal); transform: translateY(-2px); }

  .order-guide-hint{
    display:flex; justify-content:center; margin-bottom: 20px;
  }
  .order-guide-hint button{
    display:flex; align-items:center; gap:6px;
    background: none; border: none; cursor:pointer;
    font-family:'Inter', sans-serif; font-size: 12.5px; font-weight:600;
    color: var(--text-faint); padding: 4px 2px;
    transition: color .15s ease;
  }
  .order-guide-hint button:hover{ color: var(--teal); }

  /* live badge */
  .live{
    display:flex; align-items:center; justify-content:center; gap:8px;
    font-family:'JetBrains Mono', monospace; font-size: 11px;
    color: var(--teal); text-transform:uppercase; letter-spacing: .12em;
    margin-bottom: 28px;
  }
  .live .dot{ width:7px; height:7px; border-radius:50%; background: var(--teal); box-shadow: 0 0 0 4px rgba(47,211,201,0.18); animation: pulse 1.8s infinite; }
  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:.4;} }

  /* category chips */
  /* kotak pencarian */
  /* banner promo */
  .promo-banner{
    position: relative; overflow: hidden;
    display:flex; align-items:center; justify-content:center; gap: 12px;
    background: linear-gradient(120deg, #1c1d2e 0%, #35306b 45%, #0e7c72 100%);
    border-radius: 16px; padding: 16px 20px; margin-bottom: 16px;
    box-shadow: 0 14px 30px -14px rgba(28,29,46,0.45);
  }
  .promo-banner-shine{
    position:absolute; top:0; left:-60%; width:50%; height:100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.18), transparent);
    transform: skewX(-20deg);
    animation: shine 3.2s ease-in-out infinite;
  }
  @keyframes shine{
    0%{ left:-60%; }
    55%{ left:130%; }
    100%{ left:130%; }
  }
  .promo-star{ color:#ffd66b; flex:none; filter: drop-shadow(0 0 4px rgba(255,214,107,0.5)); }
  .promo-banner-text{ text-align:center; }
  .promo-banner-title{
    font-family:'Space Grotesk', sans-serif; font-weight:700; font-size: 15.5px;
    color:#fff; letter-spacing: -0.01em;
  }
  .promo-banner-sub{
    font-size: 11px; color: rgba(255,255,255,0.72); margin-top: 3px; line-height:1.4;
  }
  @media (max-width: 480px){
    .promo-banner{ padding: 12px 14px; gap: 8px; }
    .promo-banner-title{ font-size: 13px; }
    .promo-banner-sub{ font-size: 10px; }
    .promo-star{ width:14px; height:14px; }
  }

  .search-box{
    display:flex; align-items:center; gap:10px;
    background: var(--card); border: 1px solid var(--card-edge);
    border-radius: 14px; padding: 12px 16px; margin-bottom: 16px;
    color: var(--text-faint);
    transition: border-color .25s ease, color .25s ease, box-shadow .25s ease;
  }
  .search-box:focus-within{ border-color: var(--teal); color: var(--teal); box-shadow: 0 0 0 3px rgba(20,184,172,0.12); }
  .search-box input{
    flex:1; background:none; border:none; outline:none;
    color: var(--text); font-family:'Inter',sans-serif; font-size: 14px;
  }
  .search-box input::placeholder{ color: var(--text-faint); }

  .chips{
    display:flex; gap:8px; overflow-x:auto; padding-bottom: 6px; margin-bottom: 28px;
    scrollbar-width: none; scroll-behavior: smooth;
  }
  .chips::-webkit-scrollbar{ display:none; }
  .chip{
    flex: none; padding: 9px 16px; border-radius: 999px;
    background: var(--card); border: 1px solid var(--card-edge);
    color: var(--text-dim); font-size: 13px; font-weight:600;
    cursor:pointer; white-space:nowrap;
    transition: background .3s ease, color .3s ease, border-color .3s ease, transform .2s ease;
    font-family:'Inter', sans-serif;
  }
  .chip:hover{ color: var(--text); border-color: #3a3e6b; transform: translateY(-1px); }
  .chip.active{
    background: linear-gradient(120deg, var(--violet), var(--teal));
    color: #0e1022; border-color: transparent;
  }

  /* grid */
  .grid{ display:grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  @media (max-width: 480px){ .grid{ gap: 8px; } }

  .ticket{
    position: relative;
    background: var(--card);
    border: 1px solid var(--card-edge);
    border-radius: 20px;
    overflow: hidden;
    display:flex; flex-direction:column;
    animation: rise .5s ease both;
    transition: transform .22s ease, box-shadow .22s ease, border-color .22s ease;
    cursor: pointer;
  }
  .ticket:hover{
    transform: translateY(-5px);
    border-color: var(--tk-accent, #3d4177);
    box-shadow: 0 18px 34px -14px var(--tk-shadow, rgba(0,0,0,0.5));
  }

  .badge{
    height: 100px;
    display:flex; align-items:center; justify-content:center;
    position: relative; overflow:hidden;
    background:
      radial-gradient(circle at 30% 20%, var(--tk-glow, rgba(139,123,255,0.28)), transparent 60%),
      linear-gradient(155deg, #f4f4f8, #e5e6ee);
  }
  .badge::after{
    content:''; position:absolute; inset:0;
    background: linear-gradient(180deg, transparent 60%, rgba(0,0,0,0.06));
    pointer-events:none;
  }
  .badge-tile{
    position:relative; z-index:1;
    width: 60px; height: 60px; border-radius: 16px;
    background: #fff; display:flex; align-items:center; justify-content:center;
    box-shadow: 0 8px 18px -6px rgba(0,0,0,0.35);
  }
  .badge-tile img{ height: 30px; width:auto; object-fit:contain; }
  .badge .capcut-mark{ display:flex; flex-direction:column; align-items:center; gap:4px; }
  .badge .capcut-mark svg{ height:26px; width:26px; }
  .badge .capcut-mark span{
    font-family:'Space Grotesk', sans-serif; font-weight:700; font-size: 13px;
    color:#fff; letter-spacing:-0.01em;
  }
  .t-info{ padding: 15px 16px 0; }
  .t-name{ font-size: 13.5px; font-weight:700; line-height:1.35; min-height: 36px; letter-spacing: -0.01em; }
  .t-cat{
    display:inline-flex; align-items:center; gap:5px;
    font-size: 10.5px; font-weight:700; margin-top:7px;
    text-transform:uppercase; letter-spacing:.05em;
    padding: 3px 9px; border-radius: 999px;
    background: var(--tk-pill-bg, rgba(139,123,255,0.12));
    color: var(--tk-accent, var(--violet));
    border: 1px solid var(--tk-pill-border, rgba(139,123,255,0.25));
  }
  .t-preview{
    font-size: 11.5px; color: var(--text-dim); line-height:1.5;
    margin-top: 6px;
  }
  .t-detail{
    display:block;
    background:none; border:none; padding:0; margin-top: 10px;
    color: var(--gold); font-size: 11.5px; font-weight:600; cursor:pointer;
    text-decoration: underline; text-underline-offset: 2px; font-family:'Inter',sans-serif;
  }

  /* modal detail */
  .modal-overlay{
    display:flex; position:fixed; inset:0; background: rgba(6,7,16,0.72);
    backdrop-filter: blur(3px);
    align-items:center; justify-content:center; padding: 20px; z-index: 100;
    opacity: 0; visibility: hidden; pointer-events: none;
    transition: opacity .28s ease, visibility .28s ease;
  }
  .modal-overlay.open{ opacity: 1; visibility: visible; pointer-events: auto; }
  .modal-card{
    position:relative; background: var(--card); border: 1px solid var(--card-edge);
    border-radius: 20px; padding: 28px 22px 24px; max-width: 420px; width:100%;
    max-height: 85vh; overflow-y:auto;
    transform: translateY(16px) scale(0.97);
    transition: transform .32s cubic-bezier(.2,.8,.2,1);
  }
  .modal-overlay.open .modal-card{ transform: translateY(0) scale(1); }
  .modal-close{
    position:absolute; top:14px; right:14px; width:30px; height:30px; border-radius:10px;
    background: var(--bg-2); border: 1px solid var(--card-edge); color: var(--text-dim);
    cursor:pointer; font-size: 13px; transition: background .15s ease, color .15s ease, transform .15s ease;
  }
  .modal-close:hover{ color: var(--teal); transform: rotate(90deg); }
  .d-name{ font-family:'Space Grotesk', sans-serif; font-weight:700; font-size: 17px; line-height:1.3; }
  .d-avatar{
    width: 64px; height: 64px; border-radius: 20px; overflow:hidden;
    margin: 0 auto 16px; background:#fff;
    box-shadow: 0 8px 20px -6px rgba(47,211,201,0.4);
  }
  .d-avatar img{ width:100%; height:100%; object-fit:cover; }
  .d-desc{ font-size: 13.5px; color: var(--text-dim); line-height:1.6; margin-bottom: 14px; }
  .d-label{ font-family:'Space Grotesk', sans-serif; font-weight:700; font-size: 13px; margin: 14px 0 6px; }
  .d-list{ list-style:none; }
  .d-list li{ font-size: 13px; color: var(--text-dim); line-height:1.7; }

  /* panduan cara pemesanan */
  .og-steps{
    list-style: decimal; padding-left: 20px; margin: 6px 0 4px;
    display:flex; flex-direction:column; gap:8px;
  }
  .og-steps li{ font-size: 13px; color: var(--text-dim); line-height:1.55; }
  .og-steps li b{ color: var(--text); }
  .og-qris-wrap{
    display:flex; justify-content:center; margin: 10px 0 6px;
    background: #fff; border-radius: 16px; padding: 10px;
    border: 1px solid var(--card-edge);
  }
  .og-qris-wrap img{ width: 100%; max-width: 260px; border-radius: 10px; display:block; }
  .og-qris-caption{
    text-align:center; font-size: 11px; color: var(--text-faint);
    margin-bottom: 4px;
  }
  .og-confirm-btn{
    display:block; text-align:center; margin-top: 18px;
    padding: 13px 16px; font-size: 13px;
  }

  /* perforation divider */
  .perf{
    position:relative; height: 0; margin: 14px 0 0;
    border-top: 1.5px dashed var(--card-edge);
  }
  .perf::before, .perf::after{
    content:''; position:absolute; top:-8px; width:16px; height:16px;
    border-radius:50%; background: var(--bg);
  }
  .perf::before{ left:-9px; }
  .perf::after{ right:-9px; }

  .t-bottom{
    display:flex; align-items:center; justify-content:space-between;
    padding: 12px 16px 16px;
  }
  .price{ font-family:'JetBrains Mono', monospace; font-weight:800; font-size: 15.5px; color: var(--gold); letter-spacing:-0.02em; }
  .price-old{
    font-family:'JetBrains Mono', monospace; font-size: 10.5px; font-weight:600;
    color: var(--text-faint); text-decoration: line-through; text-decoration-color: #ff5f6d;
    margin-bottom: 1px;
  }
  .promo-tag{
    position:absolute; top:10px; left:10px; z-index:2;
    background: linear-gradient(120deg, #ff5f6d, #ff8a5b);
    color:#fff; font-size: 9.5px; font-weight:800;
    padding: 3px 8px; border-radius: 999px;
    box-shadow: 0 4px 10px -3px rgba(255,95,109,0.6);
    letter-spacing: .02em;
  }
  .buy{
    font-size: 11.5px; font-weight:700; color: #0e1022;
    background: linear-gradient(135deg, var(--teal), #22b8af);
    border:none; padding: 8px 14px; border-radius: 10px;
    cursor:pointer; text-decoration:none; font-family:'Inter',sans-serif;
    transition: transform .15s ease, box-shadow .15s ease;
    box-shadow: 0 6px 14px -6px rgba(47,211,201,0.55);
  }
  .buy:hover{ transform: translateY(-2px) scale(1.03); box-shadow: 0 10px 20px -6px rgba(47,211,201,0.7); }

  @keyframes rise{ from{ opacity:0; transform: translateY(10px);} to{ opacity:1; transform:none; } }

  .empty{
    grid-column: 1 / -1;
    text-align:center; padding: 48px 20px; color: var(--text-faint);
    border: 1px dashed var(--card-edge); border-radius: 18px; font-size: 13.5px;
  }

  /* padatkan tampilan kartu di layar sempit supaya 3 kolom tetap nyaman */
  @media (max-width: 480px){
    body{ padding: 32px 8px 60px; }
    .ticket{ border-radius: 14px; }
    .badge{ height: 62px; }
    .badge-tile{ width: 38px; height: 38px; border-radius: 10px; }
    .badge-tile img{ height: 20px !important; }
    .t-info{ padding: 8px 8px 0; }
    .t-name{ font-size: 10px; min-height: 26px; line-height:1.25; }
    .t-cat{ font-size: 8px; padding: 2px 6px; margin-top: 4px; }
    .t-preview{ display: none; }
    .t-detail{ font-size: 9px; margin-top: 6px; }
    .perf{ margin-top: 8px; }
    .t-bottom{ padding: 8px 8px 10px; flex-direction: column; align-items: flex-start; gap: 6px; }
    .price{ font-size: 12px; }
    .buy{ font-size: 10px; padding: 6px 10px; width: 100%; text-align:center; }
  }

  .foot{
    text-align:center; margin-top: 40px;
  }
  .foot-btn{
    display:inline-flex; align-items:center; gap:8px;
    background: var(--card); border: 1px solid var(--card-edge);
    color: var(--text); text-decoration:none;
    font-size: 13px; font-weight:600; font-family:'Inter',sans-serif;
    padding: 12px 22px; border-radius: 999px;
    transition: all .15s ease;
  }
  .foot-btn:hover{ border-color: var(--teal); color: var(--teal); transform: translateY(-2px); }
</style>
</head>

let lastCsvText = "";

// Parser CSV kecil, menangani nilai yang dibungkus tanda kutip
function parseCsv(text){
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for(let i = 0; i < text.length; i++){
    const c = text[i];
    if(inQuotes){
      if(c === '"'){
        if(text[i+1] === '"'){ field += '"'; i++; }
        else inQuotes = false;
      } else field += c;
    } else {
      if(c === '"') inQuotes = true;
      else if(c === ','){ row.push(field); field = ''; }
      else if(c === '\n' || c === '\r'){
        if(field !== '' || row.length){ row.push(field); rows.push(row); }
        row = []; field = '';
        if(c === '\r' && text[i+1] === '\n') i++;
      } else field += c;
    }
  }
  if(field !== '' || row.length){ row.push(field); rows.push(row); }
  return rows.filter(r => r.length && r.some(v => v.trim() !== ''));
}

function csvToProducts(text){
  const rows = parseCsv(text);
  if(rows.length < 2) return null;
  const header = rows[0].map(h => h.trim().toLowerCase());
  const iName = header.indexOf('nama');
  const iCat = header.indexOf('kategori');
  const iPrice = header.indexOf('harga');
  const iDesc = header.indexOf('deskripsi');
  const iBenefit = header.indexOf('benefit');
  const iKetentuan = header.indexOf('ketentuan');
  if(iName === -1 || iCat === -1 || iPrice === -1) return null;

  const splitList = (v) => (v || '').split(';').map(s => s.trim()).filter(Boolean);

  return rows.slice(1).map(r => ({
    name: (r[iName] || '').trim(),
    cat: (r[iCat] || '').trim(),
    price: parseInt(String(r[iPrice] || '0').replace(/[^0-9]/g, ''), 10) || 0,
    desc: iDesc > -1 ? (r[iDesc] || '').trim() : '',
    benefit: iBenefit > -1 ? splitList(r[iBenefit]) : [],
    ketentuan: iKetentuan > -1 ? splitList(r[iKetentuan]) : [],
  })).filter(p => p.name);
}

async function loadFromSheet(isBackground){
  if(!SHEET_CSV_URL){ setLive(false); return; }
  try{
    const res = await fetch(SHEET_CSV_URL + (SHEET_CSV_URL.includes('?') ? '&' : '?') + 'cachebust=' + Date.now());
    if(!res.ok) throw new Error('fetch failed');
    const text = await res.text();
    if(text === lastCsvText) { setLive(true); return; } // tidak ada perubahan
    const parsed = csvToProducts(text);
    if(!parsed || !parsed.length) throw new Error('format csv tidak sesuai');
    lastCsvText = text;
    products = parsed;
    setLive(true);
    renderChips();
    renderGrid();
  } catch(err){
    console.warn('Gagal memuat dari Google Sheet, pakai data cadangan.', err);
    setLive(false);
    if(!isBackground) { products = fallbackProducts; renderChips(); renderGrid(); }
  }
}

    label.textContent = 'Mode contoh — sambungkan Google Sheet di kode';
    return;
  }
  dot.style.background = ok ? 'var(--teal)' : '#ff5f6d';
  label.textContent = ok ? 'Tersambung ke Google Sheet' : 'Gagal sambung, memakai data terakhir';
}

const defaultBadge = ["#8b7bff","#5a4fd6"];

function getBadgeColors(cat){
  return ["#f4f4f8","#e3e3ee"];
}

// warna aksen kartu per kategori (dipakai untuk glow, border hover, pill label)
function getAccent(cat){
  const c = (cat || '').toLowerCase();
  if(c.includes('canva')) return { hex: '#8b7bff', rgb: '139,123,255' };
  if(c.includes('netflix')) return { hex: '#ff5f6d', rgb: '255,95,109' };
  if(c.includes('capcut')) return { hex: '#2fd3c9', rgb: '47,211,201' };
  return { hex: '#8b7bff', rgb: '139,123,255' };
}

function getBadgeContent(cat){
  const c = (cat || '').toLowerCase();
  if(c.includes('canva')) return `<div class="badge-tile"><img src="${logoCanva}" alt="Canva" style="height:34px;"></div>`;
  if(c.includes('netflix')) return `<div class="badge-tile"><img src="${logoNetflix}" alt="Netflix" style="height:20px;"></div>`;
  if(c.includes('capcut')) return `<div class="badge-tile"><img src="${logoCapcut}" alt="CapCut" style="height:26px;"></div>`;
  // fallback untuk kategori baru: badge inisial otomatis
  const initials = (cat || '?').trim().slice(0, 2).toUpperCase();
  return `<div class="badge-tile"><div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:20px;color:#0e1022;">${initials}</div></div>`;
}

const categories = ["Semua", ...Array.from(new Set(products.map(p => p.cat)))];
let active = "Semua";

const chipsEl = document.getElementById('chips');
const gridEl = document.getElementById('grid');

function formatRp(n){
  return "Rp " + n.toLocaleString('id-ID');
}

function truncate(text, max){
  if(!text) return '';
  return text.length > max ? text.slice(0, max).trim() + '…' : text;
}

function renderChips(){
  chipsEl.innerHTML = '';
  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'chip' + (cat === active ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => { active = cat; renderChips(); renderGrid(); };
    chipsEl.appendChild(btn);
  });
}

let searchTerm = '';

function renderGrid(){
  gridEl.innerHTML = '';
  let list = active === "Semua" ? products : products.filter(p => p.cat === active);
  if(searchTerm){
    const q = searchTerm.toLowerCase();
    list = list.filter(p => p.name.toLowerCase().includes(q) || p.cat.toLowerCase().includes(q));
  }

  if(list.length === 0){
    gridEl.innerHTML = `<div class="empty">${searchTerm ? `Tidak ada produk yang cocok dengan "${searchTerm}".` : 'Belum ada produk di kategori ini. Cek lagi nanti ya!'}</div>`;
    return;
  }

  list.forEach((p, i) => {
    const accent = getAccent(p.cat);
    const card = document.createElement('div');
    card.className = 'ticket';
    card.style.animationDelay = (i * 0.04) + 's';
    card.style.setProperty('--tk-accent', accent.hex);
    card.style.setProperty('--tk-shadow', `rgba(${accent.rgb},0.35)`);
    card.style.setProperty('--tk-glow', `rgba(${accent.rgb},0.30)`);
    card.style.setProperty('--tk-pill-bg', `rgba(${accent.rgb},0.14)`);
    card.style.setProperty('--tk-pill-border', `rgba(${accent.rgb},0.3)`);
    const preview = p.desc ? truncate(p.desc, 70) : '';
    const oldPrice = p.price + DISCOUNT_AMOUNT;
    card.innerHTML = `
      <div class="promo-tag">Promo -${formatRp(DISCOUNT_AMOUNT)}</div>
      <div class="badge">${getBadgeContent(p.cat)}</div>
      <div class="t-info">
        <div class="t-name">${p.name}</div>
        <div class="t-cat">${p.cat}</div>
        ${preview ? `<p class="t-preview">${preview}</p>` : ''}
        <button class="t-detail">Selengkapnya →</button>
      </div>
      <div class="perf"></div>
      <div class="t-bottom">
        <div>
          <div class="price-old">${formatRp(oldPrice)}</div>
          <div class="price">${formatRp(p.price)}</div>
        </div>
        <a class="buy" href="https://wa.me/6283839394011?text=${encodeURIComponent('Halo, saya mau order: ' + p.name)}" target="_blank">Order →</a>
      </div>
    `;
    card.querySelector('.t-detail').onclick = (e) => { e.stopPropagation(); openDetail(p); };
    card.querySelector('.buy').onclick = (e) => { e.stopPropagation(); };
    card.onclick = () => openDetail(p);
    gridEl.appendChild(card);
  });
}

renderChips();
renderGrid();
document.getElementById('avatarBox').innerHTML = `<img src="${logoFomo}" alt="Fomo Store">`;
document.getElementById('searchInput').addEventListener('input', (e) => {
  searchTerm = e.target.value.trim();
  renderGrid();
});
loadFromSheet(false);
setInterval(() => loadFromSheet(true), POLL_INTERVAL_MS);

function openDetail(p){
  const modal = document.getElementById('detailModal');
  const body = document.getElementById('detailBody');
  const benefitHtml = (p.benefit && p.benefit.length)
    ? `<div class="d-label">Benefits:</div><ul class="d-list">${p.benefit.map(b => `<li>↗ ${b}</li>`).join('')}</ul>` : '';
  const ketentuanHtml = (p.ketentuan && p.ketentuan.length)
    ? `<div class="d-label">Ketentuan:</div><ul class="d-list">${p.ketentuan.map(k => `<li>↗ ${k}</li>`).join('')}</ul>` : '';
  body.innerHTML = `
    <div class="d-avatar"><img src="${logoFomo}" alt="Fomo Store"></div>
    <div class="badge" style="border-radius:18px; margin-bottom:14px; --tk-glow: rgba(${getAccent(p.cat).rgb},0.30);">${getBadgeContent(p.cat)}</div>
    <div class="d-name">${p.name}</div>
    <div class="price-old" style="margin-top:8px;">${formatRp(p.price + DISCOUNT_AMOUNT)}</div>
    <div class="price" style="margin: 1px 0 14px;">${formatRp(p.price)} <span style="font-size:10px; font-weight:700; color:#ff5f6d; font-family:'Inter',sans-serif;">(Promo -${formatRp(DISCOUNT_AMOUNT)})</span></div>
    ${p.desc ? `<p class="d-desc">${p.desc}</p>` : ''}
    ${benefitHtml}
    ${ketentuanHtml}
    <a class="buy" style="display:inline-block; margin-top:16px;" href="https://wa.me/6283839394011?text=${encodeURIComponent('Halo, saya mau order: ' + p.name)}" target="_blank">Order →</a>
  `;
  modal.classList.add('open');
}
function closeDetail(){
  document.getElementById('detailModal').classList.remove('open');
}

    <p class="og-qris-caption">DEWANGGA MANTARA SAKTI &bull; NMID: ID1025399418827</p>

    <a class="buy og-confirm-btn" href="https://wa.me/6283839394011?text=${encodeURIComponent('Halo, saya sudah melakukan pembayaran untuk pesanan saya, ini bukti transfernya:')}" target="_blank">Konfirmasi Pembayaran via WhatsApp →</a>

  document.getElementById('orderGuideModal').classList.remove('open');
}
</script>
